name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    name: Unit (Julia ${{ matrix.julia }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 1.9 is the supported minimum; 1.11 is current.
        julia: ['1.9', '1.11', 'pre']
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Julia ${{ matrix.julia }}
        uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia }}

      - name: Cache Julia artifacts
        uses: actions/cache@v6
        env:
          cache-name: julia-artifacts
        with:
          path: |
            ~/.julia/artifacts
            ~/.julia/packages
          key: ${{ runner.os }}-julia-${{ matrix.julia }}-${{ env.cache-name }}-${{ hashFiles('Project.toml') }}
          restore-keys: ${{ runner.os }}-julia-${{ matrix.julia }}-${{ env.cache-name }}-

      - name: Instantiate project
        # Sockets and Test are Julia stdlibs. They are not in the General
        # registry, so `julia-runtest` (which runs `Pkg.test()` and re-resolves
        # [extras] in a sandbox against the registry) fails with
        # "expected package ... to be registered". Instantiate the project
        # directly instead, then run the test entrypoint in this environment.
        run: julia --project=. -e 'import Pkg; Pkg.instantiate()'

      - name: Run unit tests
        run: julia --project=. test/runtests.jl

  live:
    # The layer that catches client/server contract drift. Downloads a
    # mongreldb-server binary, starts it, and runs the live round-trip suite.
    name: Live integration (against mongreldb-server)
    runs-on: ubuntu-latest
    env:
      MONGRELDB_URL: http://127.0.0.1:8453
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.11'

      - name: Cache Julia artifacts
        uses: actions/cache@v6
        env:
          cache-name: julia-live
        with:
          path: |
            ~/.julia/artifacts
            ~/.julia/packages
          key: ${{ runner.os }}-julia-${{ env.cache-name }}-${{ hashFiles('Project.toml') }}
          restore-keys: ${{ runner.os }}-julia-${{ env.cache-name }}-

      - name: Cache mongreldb-server binary
        uses: actions/cache@v6
        id: server-cache
        with:
          path: /tmp/mongreldb-server
          key: mongreldb-server-${{ runner.os }}-0.64.2

      - name: Instantiate project
        # Resolve the Sockets stdlib (listed in [deps]) into a Manifest before
        # running the live test entrypoint, which loads MongrelDB directly.
        run: julia --project=. -e 'import Pkg; Pkg.instantiate()'

      - name: Download mongreldb-server
        if: steps.server-cache.outputs.cache-hit != 'true'
        run: |
          curl -L -o /tmp/mongreldb-server \
            https://github.com/visorcraft/MongrelDB/releases/download/v0.64.2/mongreldb-server-linux-x64
          chmod +x /tmp/mongreldb-server

      - name: Start mongreldb-server
        run: |
          rm -rf /tmp/mongreldb-data
          /tmp/mongreldb-server /tmp/mongreldb-data --port 8453 > /tmp/mongreldb-server.log 2>&1 &
          echo $! > /tmp/mongreldb-server.pid
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8453/health >/dev/null 2>&1; then
              echo "mongreldb-server is healthy"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:8453/health >/dev/null || (cat /tmp/mongreldb-server.log && exit 1)

      - name: Run live tests
        env:
          MONGRELDB_URL: http://127.0.0.1:8453
        run: julia --project=. test/live_test.jl

      - name: Run examples
        env:
          MONGRELDB_URL: http://127.0.0.1:8453
        run: |
          for ex in examples/*.jl; do
            echo "=== Running $ex ==="
            julia --project=. "$ex" || { echo "FAILED: $ex"; exit 1; }
          done

      - name: Dump server log on failure
        if: failure()
        run: cat /tmp/mongreldb-server.log

      - name: Stop mongreldb-server
        if: always()
        run: |
          if [ -f /tmp/mongreldb-server.pid ]; then
            kill "$(cat /tmp/mongreldb-server.pid)" 2>/dev/null || true
          fi
